<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Outreach Node — A premium multi-agent cold email campaign manager with self-correcting AI quality assurance and real-time pipeline orchestration.">
    <meta name="theme-color" content="#1a1a2e">
    <title>{% block title %}Outreach Node — Production Dashboard{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%233B82F6'/%3E%3Cpath d='M50 20C38.954 20 30 28.954 30 40v20c0 11.046 8.954 20 20 20s20-8.954 20-20V40c0-11.046-8.954-20-20-20z' fill='%23fff' opacity='.9'/%3E%3Cpath d='M45 40l-5 15h6l-2 10 10-15h-6l5-10z' fill='%233B82F6'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.0">
</head>
<body>
    {% block header %}
    <header class="app-header production-header" data-component="header">
        <div class="header-container">
            <a href="/" class="app-logo" data-component="header-logo" aria-label="Outreach Node Home">
                <div class="logo-wrapper">
                    <i class="fa-solid fa-leaf logo-icon" aria-hidden="true"></i>
                    <span class="logo-text">Outreach<span>Node</span></span>
                </div>
            </a>
            <nav class="app-nav" data-component="header-nav">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}" aria-current="page">
                    <i class="fa-solid fa-chart-simple" aria-hidden="true"></i> Dashboard
                </a>
            </nav>
            <div class="user-profile production-user">
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=Mughees+Tayyab&background=3B82F6&color=fff&size=32" alt="Profile" width="32" height="32">
                </div>
                <div class="user-info">
                    <span class="user-name">Mughees Tayyab</span>
                    <span class="user-role">UAV Lab Intern</span>
                </div>
            </div>
        </div>
    </header>
    {% endblock %}

    <main class="app-main production-main" data-component="main-layout">
        {% block content %}{% endblock %}
    </main>

    {% block footer %}
    <footer class="app-footer production-footer" data-component="app-footer">
        <p>&copy; 2026 Outreach Node. Developed for UAV Lab Internship by Mughees Tayyab.</p>
    </footer>
    {% endblock %}

    <div id="toast-container" class="toast-container" data-component="toast-container">
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}?v=1.2"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
